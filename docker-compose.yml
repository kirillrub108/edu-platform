services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - edu-network

  redis:
    image: redis:8-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    env_file:
      - .env
    ports:
      - "6379:6379"
    networks:
      - edu-network

  silero-tts:
    image: navatusein/silero-tts-service
    ports:
      - "9898:9898"
    environment:
      NUMBER_OF_THREADS: 4
      LANGUAGE: ru
      SAMPLE_RATE: 48000
    volumes:
      - ./silero/config.py:/usr/app/app/config.py:ro
      - silero_models:/usr/app/models
      - silero_audios:/usr/app/audios
    restart: unless-stopped
    networks:
      - edu-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      # When running pytest inside this container, testcontainers spawns
      # sibling Postgres/Ryuk containers via the host Docker. Their ports
      # are exposed on the host, not on this container's bridge — so we
      # tell testcontainers to reach them via host.docker.internal.
      # Ryuk (the cleanup reaper) is unreachable in DooD setups, disable it.
      TESTCONTAINERS_HOST_OVERRIDE: host.docker.internal
      TESTCONTAINERS_RYUK_DISABLED: "true"
      SENTRY_DSN: ${SENTRY_DSN:-}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      APP_VERSION: ${APP_VERSION:-dev}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}
    # host.docker.internal isn't auto-resolved on Linux Docker Engine;
    # extra_hosts pins it to the host gateway IP.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend/storage:/app/storage
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      # Tests use `testcontainers` to spin up a sibling Postgres via the
      # host's Docker daemon. Mounting the socket lets the test process
      # inside this container talk to the host Docker. Dev-only — do not
      # ship this mount to prod.
      - /var/run/docker.sock:/var/run/docker.sock
      # Bind tests/, conftest, and pyproject so editing tests on the host
      # shows up in the container without rebuilding.
      - ./backend/tests:/app/tests
      - ./backend/pyproject.toml:/app/pyproject.toml
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      silero-tts:
        condition: service_started
    networks:
      - edu-network

  celery_video:
    build:
      context: ./backend
      dockerfile: Dockerfile
    user: "1000:1000"
    command: >
      celery -A app.celery_app worker
      --pool=prefork
      --concurrency=2
      --queues=video
      --hostname=video@%h
      --loglevel=info
    env_file:
      - .env
    environment:
      SENTRY_DSN: ${SENTRY_DSN:-}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      APP_VERSION: ${APP_VERSION:-dev}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}
    volumes:
      - ./backend/storage:/app/storage
      - ./backend/app:/app/app
    depends_on:
      - backend
      - redis
      - silero-tts
    networks:
      - edu-network

  celery_vision:
    build:
      context: ./backend
      dockerfile: Dockerfile
    user: "1000:1000"
    command: >
      celery -A app.celery_app worker
      --pool=prefork
      --concurrency=1
      --queues=vision
      --hostname=vision@%h
      --loglevel=info
    env_file:
      - .env
    environment:
      SENTRY_DSN: ${SENTRY_DSN:-}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      APP_VERSION: ${APP_VERSION:-dev}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}
    volumes:
      - ./backend/storage:/app/storage
      - ./backend/app:/app/app
    depends_on:
      - backend
      - redis
      - silero-tts
    networks:
      - edu-network

  celery_quiz:
    build:
      context: ./backend
      dockerfile: Dockerfile
    user: "1000:1000"
    # --beat embeds the scheduler in this worker (single-instance setup) so the
    # daily purge_soft_deleted task fires. Only ONE beat must run cluster-wide.
    command: >
      celery -A app.celery_app worker
      --beat
      --schedule=/tmp/celerybeat-schedule
      --pool=prefork
      --concurrency=2
      --queues=quiz
      --hostname=quiz@%h
      --loglevel=info
    env_file:
      - .env
    environment:
      SENTRY_DSN: ${SENTRY_DSN:-}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      APP_VERSION: ${APP_VERSION:-dev}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}
    volumes:
      - ./backend/storage:/app/storage
      - ./backend/app:/app/app
    depends_on:
      - backend
      - redis
    networks:
      - edu-network

  celery_email_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    user: "1000:1000"
    # Dedicated mail worker so transactional email never competes with the
    # video/vision pipelines for concurrency.
    command: >
      celery -A app.celery_app worker
      --pool=prefork
      --concurrency=2
      --queues=celery_email
      --hostname=email@%h
      --loglevel=info
    env_file:
      - .env
    environment:
      SENTRY_DSN: ${SENTRY_DSN:-}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      APP_VERSION: ${APP_VERSION:-dev}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}
    volumes:
      - ./backend/storage:/app/storage
      - ./backend/app:/app/app
    depends_on:
      - backend
      - redis
    networks:
      - edu-network

  nginx:
    image: nginx:1.27-alpine
    # Direct /files/* delivery (sendfile) from the same storage volume the
    # backend writes to, mounted read-only. Active in prod when
    # SERVE_STATIC_VIA_NGINX=true; in dev it sits idle on :8080 while FastAPI
    # keeps serving /files/* on :8000 — `docker-compose up` needs no extra step.
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend/storage:/var/www/storage:ro
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - edu-network

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
    depends_on:
      - backend
    networks:
      - edu-network

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    env_file:
      - .env
    environment:
      GF_SECURITY_ADMIN_USER: "${GF_SECURITY_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GF_SECURITY_ADMIN_PASSWORD:-change-me}"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - edu-network

  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.celery_app flower --port=5555
    ports:
      - "5555:5555"
    env_file:
      - .env
    environment:
      FLOWER_BASIC_AUTH: "${CELERY_FLOWER_USER:-admin}:${CELERY_FLOWER_PASSWORD:-change-me}"
    depends_on:
      - redis
      - backend
    networks:
      - edu-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
      # Nuxt writes generated types here; bind-mounting makes them visible to the
      # host-side VS Code TypeScript server without any manual action.
      - ./frontend/.nuxt:/app/.nuxt
      # node_modules also bind-mounted so VS Code can resolve Nuxt/Vue type
      # declarations on the host. The entrypoint seeds it from the baked snapshot
      # on first run when the host directory is empty.
      - ./frontend/node_modules:/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - NUXT_PUBLIC_API_BASE=http://localhost:8000/api/v1
      # Empty in dev → Yandex.Metrika is fully disabled. Set the counter id only in prod.
      - NUXT_PUBLIC_METRIKA_ID=${NUXT_PUBLIC_METRIKA_ID:-}
    depends_on:
      - backend
    networks:
      - edu-network

volumes:
  postgres_data:
  silero_models:
  silero_audios:
  prometheus_data:
  grafana_data:

networks:
  edu-network:
    driver: bridge

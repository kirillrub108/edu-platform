services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - edu-network

  redis:
    image: redis:8-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    env_file:
      - .env
    ports:
      - "6379:6379"
    networks:
      - edu-network

  silero-tts:
    image: navatusein/silero-tts-service
    ports:
      - "9898:9898"
    environment:
      NUMBER_OF_THREADS: 4
      LANGUAGE: ru
      SAMPLE_RATE: 48000
    restart: unless-stopped
    networks:
      - edu-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    volumes:
      - ./backend/storage:/app/storage
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      silero-tts:
        condition: service_started
    networks:
      - edu-network

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    user: "1000:1000"
    command: celery -A app.celery_app worker --loglevel=info --pool=solo
    env_file:
      - .env
    volumes:
      - ./backend/storage:/app/storage
      - ./backend/app:/app/app
    depends_on:
      - backend
      - redis
      - silero-tts
    networks:
      - edu-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
      # Nuxt writes generated types here; bind-mounting makes them visible to the
      # host-side VS Code TypeScript server without any manual action.
      - ./frontend/.nuxt:/app/.nuxt
      # node_modules also bind-mounted so VS Code can resolve Nuxt/Vue type
      # declarations on the host. The entrypoint seeds it from the baked snapshot
      # on first run when the host directory is empty.
      - ./frontend/node_modules:/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - NUXT_PUBLIC_API_BASE=http://localhost:8000/api/v1
    depends_on:
      - backend
    networks:
      - edu-network

volumes:
  postgres_data:

networks:
  edu-network:
    driver: bridge

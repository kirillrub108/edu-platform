<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Платёж завис в pending</title>
</head>
<body style="margin:0;padding:0;background:#f4f5f7;font-family:Arial,Helvetica,sans-serif;color:#1a1a1a;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f4f5f7;padding:32px 0;">
    <tr>
      <td align="center">
        <table role="presentation" width="480" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:8px;padding:32px;">
          <tr>
            <td>
              <h1 style="margin:0 0 16px;font-size:20px;">Платёж завис в pending ⚠️</h1>
              <p style="margin:0 0 12px;font-size:15px;line-height:1.5;">
                Платёж не дошёл до терминального статуса несмотря на reconcile-свип — проверьте вручную в личном кабинете ЮKassa.
              </p>
              <p style="margin:0 0 6px;font-size:14px;">Локальный платёж: <strong>{{ payment_id }}</strong></p>
              <p style="margin:0 0 6px;font-size:14px;">YooKassa payment id: <strong>{{ yookassa_payment_id or "—" }}</strong></p>
              <p style="margin:0;font-size:14px;">Возраст: ~{{ age_minutes }} мин.</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>

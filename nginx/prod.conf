# Production nginx for Edllm — TLS termination + reverse proxy on a single
# domain (edllm.ru). Serves the Nuxt SPA, proxies /api/* to FastAPI, and serves
# /files/* straight from disk guarded by the backend's HMAC signature check
# (auth_request). Mounted at /etc/nginx/conf.d/default.conf in prod; the dev
# nginx/default.conf is a separate file and is left untouched.
#
# Change `edllm.ru` below (3 places) plus the certbot -d argument if your domain
# differs. The :443 server references the Let's Encrypt cert — run
# deploy/init-letsencrypt.sh once so the files exist before nginx starts.

upstream edllm_backend {
    server backend:8000;
}

upstream edllm_frontend {
    server frontend:3000;
}

upstream edllm_grafana {
    server grafana:3000;
}

upstream edllm_flower {
    server flower:5555;
}

# ── :80 — ACME http-01 challenge + redirect everything else to HTTPS ──────────
server {
    listen 80;
    listen [::]:80;
    server_name edllm.ru;

    # Container liveness probe for the compose healthcheck — no TLS, no upstream.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Let's Encrypt webroot challenge. certbot writes tokens here; nginx and
    # certbot share the certbot_webroot volume.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── :443 — the application ────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name edllm.ru;

    ssl_certificate     /etc/letsencrypt/live/edllm.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/edllm.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Force HTTPS for a year once TLS is confirmed working.
    add_header Strict-Transport-Security "max-age=31536000" always;

    # Stream large media (MP4/WAV/PNG) straight from disk for /files/*.
    sendfile on;
    tcp_nopush on;

    # Allow large PPTX/video uploads through to the backend; the upload route
    # enforces the real cap (MAX_VIDEO_UPLOAD_BYTES = 2 GB).
    client_max_body_size 2100m;

    gzip on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # ── API → FastAPI ─────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://edllm_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # ── Signed static delivery (/files/*) — auth_request flow preserved from
    #    the dev nginx/default.conf. The HMAC-SHA256 signature can't be checked
    #    by nginx's secure_link (MD5 only), so a bodyless subrequest hands the
    #    URL to the backend, which re-runs verify_signed_url().
    location /files/ {
        auth_request /_verify_signature;
        auth_request_set $signed_ttl $upstream_http_x_signed_ttl;
        add_header Cache-Control "public, max-age=$signed_ttl";
        alias /var/www/storage/;
    }

    # ── Protected video delivery (X-Accel-Redirect target) ────────────────────
    # The /api/v1/lessons/.../stream endpoint authorises the request, then returns
    # an empty response carrying `X-Accel-Redirect: /protected-media/<key>`; nginx
    # serves the MP4 from here (Range/sendfile). `internal` means a direct browser
    # hit → 404 — the only way in is through the authorised backend endpoint.
    location /protected-media/ {
        internal;
        alias /var/www/storage/;
    }

    location = /_verify_signature {
        internal;
        proxy_pass http://edllm_backend/internal/files/verify;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
    }

    # ── Grafana — metrics dashboards (auth: Grafana login) ────────────────────
    # proxy_pass without a URI component forwards the full request URI unchanged,
    # which is required for GF_SERVER_SERVE_FROM_SUB_PATH to work correctly.
    location /grafana/ {
        proxy_pass http://edllm_grafana;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Flower — Celery monitoring UI (auth: FLOWER_BASIC_AUTH basic auth) ────
    location /flower/ {
        proxy_pass http://edllm_flower;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── Nuxt SPA (everything else) → Nitro server ──────────────────────────────
    location / {
        proxy_pass http://edllm_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# Direct static delivery for /files/* (replaces FastAPI StaticFiles in prod).
# Mounted into the official nginx image at /etc/nginx/conf.d/default.conf, so
# this is a server block — the http{} wrapper and mime.types come from the
# image's main nginx.conf.

server {
    listen 80;
    server_name _;

    # Stream large media (MP4/WAV/PNG) straight from disk.
    sendfile on;
    tcp_nopush on;

    # Block obviously oversized requests early; real cap is the upload route.
    client_max_body_size 0;

    location /files/ {
        # ── Signature check ────────────────────────────────────────────────
        # The signed URLs use HMAC-SHA256/hex, which nginx's secure_link module
        # (plain MD5 only) cannot verify. Instead a bodyless auth_request hands
        # the original URL to the backend, which re-runs verify_signed_url().
        # On a CDN cache hit this subrequest never fires — the CDN serves the
        # file keyed by the full signed URL (query string included).
        auth_request /_verify_signature;

        # Cap Cache-Control to the signature's remaining lifetime (returned by
        # the verify endpoint). Keeps an expired URL from sticking in the CDN.
        auth_request_set $signed_ttl $upstream_http_x_signed_ttl;
        add_header Cache-Control "public, max-age=$signed_ttl";

        # Direct disk serve. nginx normalizes the request URI first — decoding
        # %2e and collapsing ../ — so traversal can't escape this root; a
        # tampered path would also fail the signature check above. Files that
        # don't exist return 404 here.
        alias /var/www/storage/;
    }

    # auth_request subrequest target — internal, not reachable from outside.
    location = /_verify_signature {
        internal;
        proxy_pass http://backend:8000/internal/files/verify;
        # Subrequest carries no body; forward only the original request line.
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
    }
}

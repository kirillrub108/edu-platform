name: CI

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ───────────────────────────────────────────────────────────────────────
  # Lint — fast, runs even on draft PRs. Ruff isn't yet in the project,
  # so this job is a no-op placeholder until it lands. Keeping the job
  # name stable lets branch protection require it from day one.
  # ───────────────────────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for ruff config
        id: ruff_cfg
        run: |
          if [ -f backend/ruff.toml ] || grep -q '\[tool.ruff\]' backend/pyproject.toml; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.ruff_cfg.outputs.present == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install ruff
        if: steps.ruff_cfg.outputs.present == 'true'
        run: pip install ruff

      - name: ruff check + format
        if: steps.ruff_cfg.outputs.present == 'true'
        working-directory: backend
        run: |
          ruff check .
          ruff format --check .

      - name: Skip notice
        if: steps.ruff_cfg.outputs.present != 'true'
        run: echo "ruff not configured in backend/pyproject.toml — skipping"

  # ───────────────────────────────────────────────────────────────────────
  # Tests — testcontainers brings up postgres:17-alpine on demand, so we
  # only need a working Docker socket on the runner (provided by default
  # on ubuntu-latest). Redis is patched with fakeredis in the test suite.
  # ───────────────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install backend test deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests (unit + integration, excluding slow)
        working-directory: backend
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          pytest -m "not slow" \
            --cov=app \
            --cov-report=xml \
            --cov-report=term \
            --cov-fail-under=70

      - name: Upload coverage XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: backend/coverage.xml
          if-no-files-found: ignore

  # ───────────────────────────────────────────────────────────────────────
  # Build + push images to Yandex Container Registry. Heavy (LibreOffice
  # + ffmpeg + poppler ≈ 1.5 GB image), so PRs only run test/lint — this
  # job is gated to push events on the default branch.
  # ───────────────────────────────────────────────────────────────────────
  build-and-push:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      # TODO(yc-deploy): replace cr.yandex/<registry-id> with the real ID
      # produced by `yc container registry get-id` after provisioning the
      # YCR registry. Until then this job will fail at the docker push.
      YC_REGISTRY: cr.yandex/REPLACE_WITH_REGISTRY_ID
      IMAGE_BACKEND: edu-platform-backend
      IMAGE_CELERY: edu-platform-celery

    steps:
      - uses: actions/checkout@v4

      - name: Install yc CLI
        run: |
          curl -fsSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash -s -- -i /opt/yc -n
          echo "/opt/yc/bin" >> "$GITHUB_PATH"

      - name: Configure yc with SA key
        env:
          YC_SA_JSON_CREDENTIALS: ${{ secrets.YC_SA_JSON_CREDENTIALS }}
        run: |
          echo "$YC_SA_JSON_CREDENTIALS" > /tmp/sa-key.json
          yc config profile create ci
          yc config set service-account-key /tmp/sa-key.json

      - name: Docker login to YCR
        run: |
          yc container registry configure-docker

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # The repo currently has a single Dockerfile for both backend and
      # celery — the difference is the runtime command. Build once, tag
      # twice; the celery containers in docker-compose.yml already
      # override the CMD.
      - name: Build + push image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.YC_REGISTRY }}/${{ env.IMAGE_BACKEND }}:${{ github.sha }}
            ${{ env.YC_REGISTRY }}/${{ env.IMAGE_BACKEND }}:latest
            ${{ env.YC_REGISTRY }}/${{ env.IMAGE_CELERY }}:${{ github.sha }}
            ${{ env.YC_REGISTRY }}/${{ env.IMAGE_CELERY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ───────────────────────────────────────────────────────────────────────
  # Deploy — SSH to the Compute Instance, pull fresh images, restart the
  # stack via docker-compose, smoke-test /health. This is a SKELETON;
  # real VM host + SSH key need to be set in repo secrets first.
  # ───────────────────────────────────────────────────────────────────────
  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install SSH key
        # TODO(yc-deploy): rotate the key periodically; keep public half
        # in the VM's authorized_keys.
        env:
          YC_VM_SSH_KEY: ${{ secrets.YC_VM_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$YC_VM_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Pull + restart stack on Compute Instance
        env:
          # TODO(yc-deploy): set YC_VM_HOST to the static public IP or DNS
          # name of the Compute Instance once provisioned.
          YC_VM_HOST: ${{ secrets.YC_VM_HOST }}
          YC_VM_USER: ${{ secrets.YC_VM_USER }}
        run: |
          ssh -o StrictHostKeyChecking=accept-new "${YC_VM_USER}@${YC_VM_HOST}" <<'EOF'
            set -euo pipefail
            cd /opt/edu-platform
            docker-compose pull
            docker-compose up -d
          EOF

      - name: Smoke-test /health
        env:
          YC_VM_HOST: ${{ secrets.YC_VM_HOST }}
        # TODO(yc-deploy): replace localhost with the public API hostname
        # once nginx / a load balancer is in front of the VM.
        run: |
          for i in 1 2 3 4 5 6; do
            if curl -fsS "https://${YC_VM_HOST}/health"; then
              echo "OK"; exit 0
            fi
            sleep 5
          done
          echo "health check failed"; exit 1

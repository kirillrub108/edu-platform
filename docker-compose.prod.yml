# Production stack for Edllm. SELF-CONTAINED — NOT an override of
# docker-compose.yml. Do not run with `-f docker-compose.yml -f this`: Compose
# MERGES lists (volumes/ports), so a dev bind-mount would silently leak in.
# Code comes ONLY from the built images; there are no source bind-mounts here.
#
#   Build:    docker compose -f docker-compose.prod.yml --env-file .env.prod build
#   Migrate:  docker compose -f docker-compose.prod.yml --env-file .env.prod --profile migrate run --rm migrate
#   Up:       docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
#   Validate: docker compose -f docker-compose.prod.yml --env-file .env.prod config
#
# App containers run as root (image default). The dev compose pins workers to
# uid 1000 because storage is a host bind-mount; in prod storage is the
# `app_storage` named volume shared by backend + all workers, so uniform root
# ownership avoids cross-container permission mismatches. Hardening to a
# non-root uid is a separate follow-up (needs a Dockerfile chown).

# ── Reusable fragments (x-* are ignored by Compose; anchors are expanded) ─────
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

x-extra-hosts: &extra-hosts
  # Lets backend/workers reach a host-side Ollama (host.docker.internal) when
  # the LLM/vision provider is local. Harmless when using a cloud provider.
  - "host.docker.internal:host-gateway"

# Generated files (PPTX/PNG/WAV/MP4 + caches) shared by backend + every worker.
# Mount point matches STORAGE_PATH=/app/storage in .env.prod.
x-app-storage: &app-storage
  - app_storage:/app/storage

x-backend-env: &backend-env
  env_file:
    - .env.prod
  environment:
    ENVIRONMENT: ${ENVIRONMENT:-production}
    APP_VERSION: ${APP_VERSION:-prod}
    SENTRY_DSN: ${SENTRY_DSN:-}
    SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}

# Per-container liveness for a Celery worker: confirms the broker is reachable
# and a worker replies. (The task spec's canonical check.)
x-celery-healthcheck: &celery-healthcheck
  test: ["CMD-SHELL", "celery -A app.celery_app inspect ping -t 10 >/dev/null 2>&1 || exit 1"]
  interval: 30s
  timeout: 15s
  retries: 5
  start_period: 60s

services:
  postgres:
    image: postgres:17-alpine
    # Only POSTGRES_* — don't dump the whole secret file into this container.
    # Interpolated from --env-file .env.prod.
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1g
    networks:
      - edu-network
    logging: *default-logging

  redis:
    image: redis:8-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env.prod}
    # Only the password (needed by the healthcheck); not the whole secret file.
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
    networks:
      - edu-network
    logging: *default-logging

  silero-tts:
    image: navatusein/silero-tts-service
    environment:
      NUMBER_OF_THREADS: 4
      LANGUAGE: ru
      SAMPLE_RATE: 48000
    volumes:
      - ./silero/config.py:/usr/app/app/config.py:ro
      - silero_models:/usr/app/models
      - silero_audios:/usr/app/audios
    healthcheck:
      # TCP liveness on the TTS port — image-tool-agnostic (silero is a Python
      # service, so python3 is on PATH).
      test: ["CMD-SHELL", "python3 -c \"import socket; socket.create_connection(('127.0.0.1',9898),3).close()\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2g
    networks:
      - edu-network
    logging: *default-logging

  # ── One-shot migrations. NOT started by `up` (migrate profile). The deploy
  #    script runs this to completion BEFORE rolling out the app; a failed
  #    migration fails the deploy and leaves the running version untouched.
  #    `alembic upgrade head` resolves the URL from settings.DATABASE_URL via
  #    alembic/env.py (async path) — no psycopg2 conversion needed here.
  migrate:
    image: ${BACKEND_IMAGE:-edllm-backend:local}
    build:
      context: ./backend
      dockerfile: Dockerfile
    profiles: ["migrate"]
    command: alembic upgrade head
    <<: *backend-env
    extra_hosts: *extra-hosts
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - edu-network
    logging: *default-logging

  backend:
    image: ${BACKEND_IMAGE:-edllm-backend:local}
    build:
      context: ./backend
      dockerfile: Dockerfile
    # Production server: gunicorn master + N uvicorn workers, no --reload.
    command: >
      gunicorn app.main:app
      -k uvicorn.workers.UvicornWorker
      --workers ${GUNICORN_WORKERS:-4}
      --bind 0.0.0.0:8000
      --timeout 120
      --graceful-timeout 30
      --access-logfile -
      --error-logfile -
    <<: *backend-env
    extra_hosts: *extra-hosts
    volumes: *app-storage
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      silero-tts:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2g
    networks:
      - edu-network
    logging: *default-logging

  celery_video:
    image: ${BACKEND_IMAGE:-edllm-backend:local}
    command: >
      celery -A app.celery_app worker
      --pool=prefork
      --concurrency=2
      --queues=video
      --hostname=video@%h
      --loglevel=info
    <<: *backend-env
    extra_hosts: *extra-hosts
    volumes: *app-storage
    healthcheck: *celery-healthcheck
    # Give long video tasks time to finish on SIGTERM (Celery warm shutdown).
    stop_grace_period: 120s
    depends_on:
      redis:
        condition: service_healthy
      silero-tts:
        condition: service_started
      backend:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 3g
    networks:
      - edu-network
    logging: *default-logging

  celery_vision:
    image: ${BACKEND_IMAGE:-edllm-backend:local}
    command: >
      celery -A app.celery_app worker
      --pool=prefork
      --concurrency=1
      --queues=vision
      --hostname=vision@%h
      --loglevel=info
    <<: *backend-env
    extra_hosts: *extra-hosts
    volumes: *app-storage
    healthcheck: *celery-healthcheck
    stop_grace_period: 120s
    depends_on:
      redis:
        condition: service_healthy
      silero-tts:
        condition: service_started
      backend:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2g
    networks:
      - edu-network
    logging: *default-logging

  # The ONLY beat in the cluster (--beat). Schedules the daily
  # purge_soft_deleted job. Do NOT add --beat to any other worker or replicate
  # this service, or purge runs twice.
  celery_quiz:
    image: ${BACKEND_IMAGE:-edllm-backend:local}
    command: >
      celery -A app.celery_app worker
      --beat
      --schedule=/tmp/celerybeat-schedule
      --pool=prefork
      --concurrency=2
      --queues=quiz
      --hostname=quiz@%h
      --loglevel=info
    <<: *backend-env
    extra_hosts: *extra-hosts
    volumes: *app-storage
    healthcheck: *celery-healthcheck
    stop_grace_period: 30s
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1g
    networks:
      - edu-network
    logging: *default-logging

  celery_email_worker:
    image: ${BACKEND_IMAGE:-edllm-backend:local}
    command: >
      celery -A app.celery_app worker
      --pool=prefork
      --concurrency=2
      --queues=celery_email
      --hostname=email@%h
      --loglevel=info
    <<: *backend-env
    extra_hosts: *extra-hosts
    volumes: *app-storage
    healthcheck: *celery-healthcheck
    stop_grace_period: 30s
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
    networks:
      - edu-network
    logging: *default-logging

  frontend:
    image: ${FRONTEND_IMAGE:-edllm-frontend:local}
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    # The SPA needs no backend secrets. apiBase is relative by default (same
    # origin behind nginx); override only if the API ever moves off-domain.
    environment:
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-/api/v1}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
    networks:
      - edu-network
    logging: *default-logging

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - app_storage:/var/www/storage:ro
      - letsencrypt:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro
    ports:
      - "80:80"
      - "443:443"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/healthz >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m
    networks:
      - edu-network
    logging: *default-logging

  # On-demand only (certbot profile). Issuance: deploy/init-letsencrypt.sh.
  # Renewal + nginx reload hook: deploy/systemd/certbot-renew.{service,timer}.
  certbot:
    image: certbot/certbot:latest
    profiles: ["certbot"]
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    networks:
      - edu-network
    logging: *default-logging

volumes:
  postgres_data:
  # Generated PPTX/PNG/WAV/MP4 + caches. Shared RW by backend + all workers,
  # mounted RO into nginx for direct /files/* delivery. Replaces the dev host
  # bind-mount ./backend/storage.
  app_storage:
  silero_models:
  silero_audios:
  # Shared between nginx (RO) and certbot (RW).
  letsencrypt:
  certbot_webroot:

networks:
  edu-network:
    driver: bridge
